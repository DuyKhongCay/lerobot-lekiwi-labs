# Shared LeKiwi robot connection config -- single source of truth, pulled into every
# lekiwi_*.yaml via `robot: !include lekiwi_robot.yaml` (path resolved relative to the
# including file). Edit remote_ip here once when your network changes.
type: lekiwi_client            # laptop-side client; the host runs on the robot itself
remote_ip: 192.168.1.6       # LeKiwi host IP -- changes with your network
id: DuyKhongCay
polling_timeout_ms: 40         # give the host time to stream each observation (default 15)
# Pin all 3 cameras explicitly (upstream's default dropped to 2); the client only uses
# width/height for dataset feature shapes -- the host does the actual capture + rotation.
cameras: !include lekiwi_cameras.yaml
